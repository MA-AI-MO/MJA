name: Deploy site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - index.html
      - app.js
      - styles.css
      - 404.html
      - assets/**
      - data/**

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Audit dataset windows
        run: python scripts/audit_review_datasets.py

      - name: Prepare Pages artifact
        run: |
          rm -rf site-dist
          mkdir -p site-dist/data site-dist/assets
          cp index.html site-dist/index.html
          if [ -f 404.html ]; then cp 404.html site-dist/404.html; else cp index.html site-dist/404.html; fi
          cp app.js site-dist/app.js
          cp styles.css site-dist/styles.css
          cp -R assets/. site-dist/assets/
          cp -R data/. site-dist/data/
          touch site-dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
