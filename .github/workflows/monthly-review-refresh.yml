name: Monthly review data refresh

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Start date in YYYY-MM-DD format"
        required: false
      until:
        description: "End date in YYYY-MM-DD format"
        required: false
  schedule:
    - cron: "17 9 2 * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh data
        env:
          INPUT_SINCE: ${{ github.event.inputs.since }}
          INPUT_UNTIL: ${{ github.event.inputs.until }}
        run: |
          if [ -n "$INPUT_UNTIL" ]; then
            python scripts/refresh_review_data.py --since "${INPUT_SINCE:-2023-01-01}" --until "$INPUT_UNTIL"
          else
            python scripts/refresh_review_data.py --since "${INPUT_SINCE:-2023-01-01}"
          fi

      - name: Prepare Pages artifact
        run: |
          mkdir -p site-dist
          cp index.html site-dist/index.html
          cp index.html site-dist/404.html
          cp app.js site-dist/app.js
          cp styles.css site-dist/styles.css
          cp -R assets site-dist/assets
          cp -R data site-dist/data
          touch site-dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-dist

      - name: Commit and push refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Automated monthly review data refresh"
          git push

  deploy:
    needs: refresh-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
