name: Monthly review data refresh

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Start date in YYYY-MM-DD format"
        required: false
      until:
        description: "End date in YYYY-MM-DD format"
        required: false
  schedule:
    - cron: "17 9 2 * *"

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh data
        env:
          INPUT_SINCE: ${{ github.event.inputs.since }}
          INPUT_UNTIL: ${{ github.event.inputs.until }}
        run: |
          if [ -n "$INPUT_UNTIL" ]; then
            python scripts/refresh_review_data.py --since "${INPUT_SINCE:-2023-01-01}" --until "$INPUT_UNTIL"
          else
            python scripts/refresh_review_data.py --since "${INPUT_SINCE:-2023-01-01}"
          fi

      - name: Commit and push refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Automated monthly review data refresh"
          git push
