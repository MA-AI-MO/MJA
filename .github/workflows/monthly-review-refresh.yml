name: Monthly review data refresh

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Start date in YYYY-MM-DD format"
        required: false
      until:
        description: "End date in YYYY-MM-DD format"
        required: false
  schedule:
    - cron: "17 9 2 * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Resolve refresh window
        id: refresh-window
        env:
          INPUT_SINCE: ${{ github.event.inputs.since }}
          INPUT_UNTIL: ${{ github.event.inputs.until }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -n "$INPUT_SINCE" ]; then
            SINCE_VALUE="$INPUT_SINCE"
          else
            SINCE_VALUE="2023-01-01"
          fi
          if [ -n "$INPUT_UNTIL" ]; then
            UNTIL_VALUE="$INPUT_UNTIL"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            UNTIL_VALUE="$(date -u -d "$(date -u +%Y-%m-01) -1 day" +%F)"
          else
            UNTIL_VALUE="$(date -u +%F)"
          fi
          echo "since=$SINCE_VALUE" >> "$GITHUB_OUTPUT"
          echo "until=$UNTIL_VALUE" >> "$GITHUB_OUTPUT"
          echo "Refreshing reviews from $SINCE_VALUE through $UNTIL_VALUE"

      - name: Refresh review data
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/refresh_review_data.py \
            --since "${{ steps.refresh-window.outputs.since }}" \
            --until "${{ steps.refresh-window.outputs.until }}" \
            --target 0 \
            --max-output 120000

      - name: Audit dataset windows
        run: python scripts/audit_review_datasets.py

      - name: Prepare Pages artifact
        run: |
          rm -rf site-dist
          mkdir -p site-dist/data site-dist/assets
          cp index.html site-dist/index.html
          cp index.html site-dist/404.html
          cp app.js site-dist/app.js
          cp styles.css site-dist/styles.css
          cp -R assets/. site-dist/assets/
          cp -R data/. site-dist/data/
          touch site-dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site-dist

      - name: Commit and push refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Automated monthly review data refresh"
          git push

  deploy:
    needs: refresh-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
